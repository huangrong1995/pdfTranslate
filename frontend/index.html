<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 翻译工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .upload-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .drop-zone p {
            color: #666;
            font-size: 1.1rem;
        }

        .drop-zone .hint {
            color: #999;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .direction-select {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .direction-select label {
            font-weight: 500;
            color: #333;
        }

        select {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            background: white;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-section {
            display: none;
            margin-top: 20px;
        }

        .progress-section.active {
            display: block;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            margin-top: 10px;
            color: #666;
            font-size: 0.9rem;
        }

        .result-section {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .result-section.active {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .result-tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 8px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .text-panel {
            display: none;
            max-height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.8;
        }

        .text-panel.active {
            display: block;
        }

        .error {
            background: #ffe0e0;
            color: #d00;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        #fileInput {
            display: none;
        }

        .filename {
            margin-top: 15px;
            padding: 10px 15px;
            background: #e0e0e0;
            border-radius: 8px;
            display: inline-block;
            font-size: 0.9rem;
        }

        .filename span {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PDF 翻译工具</h1>

        <div class="upload-section">
            <div class="drop-zone" id="dropZone">
                <p>拖拽 PDF 文件到此处，或点击选择文件</p>
                <p class="hint">支持 .pdf 格式</p>
            </div>
            <input type="file" id="fileInput" accept=".pdf">

            <div class="filename" id="fileName" style="display: none;">
                已选择: <span id="fileNameText"></span>
            </div>

            <div class="controls">
                <div class="direction-select">
                    <label for="direction">翻译方向:</label>
                    <select id="direction">
                        <option value="en2zh">英译汉 (English → 中文)</option>
                        <option value="zh2en">汉译英 (中文 → English)</option>
                    </select>
                </div>

                <button class="btn btn-primary" id="translateBtn" disabled>开始翻译</button>
            </div>

            <div class="progress-section" id="progressSection">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">正在翻译...</p>
            </div>

            <div class="error" id="errorMsg"></div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2>翻译结果</h2>
                <div class="result-tabs">
                    <button class="tab-btn active" data-tab="original">原文</button>
                    <button class="tab-btn" data-tab="translated">译文</button>
                    <button class="tab-btn" data-tab="both">对比</button>
                </div>
                <button class="btn btn-primary" id="downloadBtn">下载译文</button>
            </div>

            <div class="text-panel active" id="originalPanel"></div>
            <div class="text-panel" id="translatedPanel"></div>
            <div class="text-panel" id="bothPanel"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDiv = document.getElementById('fileName');
        const fileNameText = document.getElementById('fileNameText');
        const directionSelect = document.getElementById('direction');
        const translateBtn = document.getElementById('translateBtn');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultSection = document.getElementById('resultSection');
        const originalPanel = document.getElementById('originalPanel');
        const translatedPanel = document.getElementById('translatedPanel');
        const bothPanel = document.getElementById('bothPanel');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMsg = document.getElementById('errorMsg');

        let selectedFile = null;
        let downloadFilename = null;
        let paragraphs = [];

        // Drag and drop handlers
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                showError('请选择 PDF 文件');
                return;
            }

            selectedFile = file;
            fileNameText.textContent = file.name;
            fileNameDiv.style.display = 'block';
            translateBtn.disabled = false;
            hideError();
            resultSection.classList.remove('active');
        }

        translateBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            translateBtn.disabled = true;
            progressSection.classList.add('active');
            resultSection.classList.remove('active');
            hideError();
            progressFill.style.width = '0%';
            progressText.textContent = '正在提取 PDF 内容...';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('direction', directionSelect.value);

            paragraphs = [];

            try {
                const response = await fetch('/api/translate/stream', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '翻译失败');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let originalText = '';
                let done = false;

                while (!done) {
                    const { value, done: streamDone } = await reader.read();
                    done = streamDone;
                    if (value) {
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));

                                    if (data.type === 'start') {
                                        originalText = data.original_text;
                                        progressText.textContent = `正在翻译... 0/${data.total}`;
                                    } else if (data.type === 'progress') {
                                        progressFill.style.width = data.percent + '%';
                                        progressText.textContent = `正在翻译... ${data.completed}/${data.total}`;
                                        paragraphs.push(data.paragraph);
                                    } else if (data.type === 'done') {
                                        progressFill.style.width = '100%';
                                        progressText.textContent = '翻译完成!';
                                    }
                                } catch (e) {
                                    // 忽略解析错误
                                }
                            }
                        }
                    }
                }

                // 构建结果视图
                originalPanel.textContent = originalText;
                translatedPanel.textContent = paragraphs.map(p => p.translated).join('\n\n');

                // 构建段落对照视图
                const comparisonLines = [];
                for (let i = 0; i < paragraphs.length; i++) {
                    const p = paragraphs[i];
                    comparisonLines.push(`【段落 ${i+1}】`);
                    comparisonLines.push(`原文：${p.original}`);
                    comparisonLines.push('');
                    comparisonLines.push(`译文：${p.translated}`);
                    if (i < paragraphs.length - 1) {
                        comparisonLines.push('');
                        comparisonLines.push('----------------------------------------');
                        comparisonLines.push('');
                    }
                }
                bothPanel.textContent = comparisonLines.join('\n');

                // 获取下载文件名
                const allText = `=== 原文 ===\n${originalText}\n\n=== 译文 ===\n${paragraphs.map(p => p.translated).join('\n\n')}`;
                downloadFilename = null; // 流式响应不返回filename，改用直接显示

                setTimeout(() => {
                    progressSection.classList.remove('active');
                    resultSection.classList.add('active');
                    switchTab('original');
                }, 500);

            } catch (err) {
                showError(err.message);
                progressSection.classList.remove('active');
            } finally {
                translateBtn.disabled = false;
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (downloadFilename) {
                window.open(`/api/download/${downloadFilename}`, '_blank');
            }
        });

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                switchTab(btn.dataset.tab);
            });
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.text-panel').forEach(p => p.classList.remove('active'));

            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');

            if (tab === 'original') originalPanel.classList.add('active');
            else if (tab === 'translated') translatedPanel.classList.add('active');
            else bothPanel.classList.add('active');
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('active');
        }

        function hideError() {
            errorMsg.classList.remove('active');
        }
    </script>
</body>
</html>
